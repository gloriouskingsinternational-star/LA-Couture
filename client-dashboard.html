<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Dashboard — L.A. Couture</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .dashboard-container {
      background: var(--navy);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .dashboard-header h1 {
      color: var(--ivory);
      font-size: 2rem;
      margin: 0;
    }

    .logout-btn {
      padding: 10px 20px;
      background: rgba(255, 69, 69, 0.1);
      color: #ff6b6b;
      border: 1px solid rgba(255, 69, 69, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: rgba(255, 69, 69, 0.2);
    }

    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tab-btn {
      padding: 12px 24px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tab-btn:hover {
      color: var(--gold);
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      margin-bottom: 32px;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px;
    }

    .card h3 {
      color: var(--gold);
      margin-top: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.9rem;
    }

    .card p {
      color: var(--text);
      margin: 8px 0;
      line-height: 1.6;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 12px;
    }

    .status-approved {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }

    .status-pending {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .status-rejected {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: var(--text);
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--ivory);
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-submit {
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--gold) 0%, #a8751a 100%);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(197, 155, 45, 0.3);
    }

    .enquiry-list {
      display: grid;
      gap: 16px;
    }

    .enquiry-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .enquiry-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--gold);
    }

    .enquiry-item h4 {
      color: var(--ivory);
      margin: 0 0 8px 0;
    }

    .enquiry-item p {
      color: var(--text);
      margin: 4px 0;
      font-size: 0.9rem;
    }

    .message-thread {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      max-height: 400px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .message:last-child {
      border-bottom: none;
    }

    .message-sender {
      font-weight: 600;
      color: var(--gold);
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .message-text {
      color: var(--text);
      line-height: 1.6;
    }

    .message-time {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .success-msg {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.3);
      color: #4caf50;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .dashboard-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .tabs {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body style="background: var(--navy);">
  <div class="dashboard-container">
    <div class="container">
      <div class="dashboard-header">
        <h1>My Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="profile">Profile</button>
        <button class="tab-btn" data-tab="enquiry">Make Enquiry</button>
        <button class="tab-btn" data-tab="enquiries">My Enquiries</button>
        <button class="tab-btn" data-tab="messages">Messages</button>
      </div>

      <!-- PROFILE TAB -->
      <div id="profile" class="tab-content active">
        <div class="grid-2">
          <div class="card">
            <h3>Account Information</h3>
            <p><strong>Name:</strong> <span id="clientName">-</span></p>
            <p><strong>Email:</strong> <span id="clientEmail">-</span></p>
            <p><strong>Phone:</strong> <span id="clientPhone">-</span></p>
          </div>
          <div class="card">
            <h3>Account Status</h3>
            <p><strong>Status:</strong></p>
            <div id="accountStatus"></div>
            <p style="margin-top: 16px; font-size: 0.9rem; color: var(--muted);">
              Account registered on <span id="registeredDate">-</span>
            </p>
          </div>
        </div>
      </div>

      <!-- MAKE ENQUIRY TAB -->
      <div id="enquiry" class="tab-content">
        <div class="card">
          <h3 style="margin-bottom: 24px;">Create New Enquiry</h3>
          <div class="success-msg" id="successMsg">Enquiry submitted successfully!</div>

          <form id="enquiryForm">
            <div class="form-group">
              <label for="subject">Subject *</label>
              <input type="text" id="subject" placeholder="e.g., Bridal Gown Enquiry" required>
            </div>

            <div class="form-group">
              <label for="category">Collection Interest *</label>
              <select id="category" required>
                <option value="">Select a category</option>
                <option value="ready-to-wear">Ready to Wear</option>
                <option value="bespoke">Bespoke</option>
                <option value="bridal">Bridal</option>
                <option value="accessories">Accessories</option>
                <option value="evening">Evening Wear</option>
              </select>
            </div>

            <div class="form-group">
              <label for="message">Message *</label>
              <textarea id="message" placeholder="Describe your enquiry..." required style="min-height: 120px;"></textarea>
            </div>

            <button type="submit" class="btn-submit">Submit Enquiry</button>
          </form>
        </div>
      </div>

      <!-- MY ENQUIRIES TAB -->
      <div id="enquiries" class="tab-content">
        <div id="enquiriesList" class="enquiry-list">
          <p style="color: var(--muted); text-align: center;">No enquiries yet</p>
        </div>
      </div>

      <!-- MESSAGES TAB -->
      <div id="messages" class="tab-content">
        <div class="card">
          <h3 style="margin-bottom: 20px;">Communication with Admin</h3>
          <div class="message-thread" id="messageThread">
            <p style="color: var(--muted); text-align: center;">No messages yet</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ENQUIRY MODAL -->
  <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); z-index: 1000; align-items: center; justify-content: center; display: none;" id="enquiryModal">
    <div style="background: var(--navy); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
      <button onclick="closeEnquiryModal()" style="float: right; font-size: 28px; cursor: pointer; color: var(--text); background: none; border: none;">&times;</button>
      <div id="enquiryDetail"></div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Check authentication
    if (!AuthSystem.isAuthenticated() || AuthSystem.getCurrentUser().role !== 'client') {
      window.location.href = 'client-login.html';
    }

    const currentUser = AuthSystem.getCurrentUser();

    // Load profile
    document.getElementById('clientName').textContent = currentUser.name;
    document.getElementById('clientEmail').textContent = currentUser.email;
    document.getElementById('clientPhone').textContent = currentUser.phone || 'Not provided';
    document.getElementById('registeredDate').textContent = AuthSystem.formatDate(currentUser.registeredAt);

    const statusHtml = `<span class="status-badge status-${currentUser.status}">${currentUser.status.toUpperCase()}</span>`;
    document.getElementById('accountStatus').innerHTML = statusHtml;

    // Tab navigation
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        
        e.target.classList.add('active');
        const tabName = e.target.dataset.tab;
        document.getElementById(tabName).classList.add('active');

        if (tabName === 'enquiries') {
          loadEnquiries();
        } else if (tabName === 'messages') {
          loadMessages();
        }
      });
    });

    // Submit enquiry form
    document.getElementById('enquiryForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const subject = document.getElementById('subject').value;
      const category = document.getElementById('category').value;
      const message = document.getElementById('message').value;

      const enquiry = AuthSystem.addEnquiry({
        clientId: currentUser.id,
        clientName: currentUser.name,
        clientEmail: currentUser.email,
        subject,
        category,
        description: message
      });

      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('enquiryForm').reset();

      setTimeout(() => {
        document.getElementById('successMsg').style.display = 'none';
      }, 3000);
    });

    function loadEnquiries() {
      const enquiries = AuthSystem.getClientEnquiries(currentUser.id);
      const container = document.getElementById('enquiriesList');

      if (enquiries.length === 0) {
        container.innerHTML = '<p style="color: var(--muted); text-align: center;">No enquiries yet</p>';
        return;
      }

      container.innerHTML = enquiries.map(enq => `
        <div class="enquiry-item" onclick="viewEnquiry('${enq.id}')">
          <h4>${enq.subject}</h4>
          <p><strong>Category:</strong> ${enq.category}</p>
          <p><strong>Status:</strong> <span style="color: var(--gold);">${enq.status.toUpperCase()}</span></p>
          <p style="color: var(--muted); font-size: 0.85rem;">Created: ${AuthSystem.formatDate(enq.createdAt)}</p>
          <p style="color: var(--text); margin-top: 12px; line-height: 1.6;">${enq.description}</p>
        </div>
      `).join('');
    }

    function viewEnquiry(enquiryId) {
      const enquiries = AuthSystem.getClientEnquiries(currentUser.id);
      const enquiry = enquiries.find(e => e.id === enquiryId);

      if (!enquiry) return;

      const messagesHtml = enquiry.messages.map(msg => `
        <div class="message">
          <div class="message-sender">${msg.sender}</div>
          <div class="message-text">${msg.text}</div>
          <div class="message-time">${AuthSystem.formatDate(msg.timestamp)}</div>
        </div>
      `).join('');

      const detailHtml = `
        <h3 style="color: var(--ivory); margin-bottom: 16px;">${enquiry.subject}</h3>
        <p><strong>Category:</strong> ${enquiry.category}</p>
        <p><strong>Status:</strong> <span style="color: var(--gold);">${enquiry.status.toUpperCase()}</span></p>
        
        <div class="message-thread" style="margin-top: 20px;">
          ${messagesHtml || '<p style="color: var(--muted);">No messages yet</p>'}
        </div>

        <div class="form-group">
          <label>Your Message:</label>
          <textarea id="clientMessage" placeholder="Type your response..." style="min-height: 100px;"></textarea>
        </div>

        <button onclick="sendMessage('${enquiryId}')" class="btn-submit">Send Message</button>
      `;

      document.getElementById('enquiryDetail').innerHTML = detailHtml;
      document.getElementById('enquiryModal').style.display = 'flex';
    }

    function sendMessage(enquiryId) {
      const text = document.getElementById('clientMessage').value;
      if (!text.trim()) {
        alert('Please enter a message');
        return;
      }

      AuthSystem.sendMessage(enquiryId, text, 'Client');
      document.getElementById('clientMessage').value = '';
      viewEnquiry(enquiryId); // Refresh
      alert('Message sent');
    }

    function loadMessages() {
      const enquiries = AuthSystem.getClientEnquiries(currentUser.id);
      const allMessages = [];

      enquiries.forEach(enq => {
        enq.messages.forEach(msg => {
          allMessages.push({
            ...msg,
            enquirySubject: enq.subject
          });
        });
      });

      allMessages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      const container = document.getElementById('messageThread');
      if (allMessages.length === 0) {
        container.innerHTML = '<p style="color: var(--muted); text-align: center;">No messages yet</p>';
        return;
      }

      container.innerHTML = allMessages.map(msg => `
        <div class="message">
          <div class="message-sender">${msg.sender} - Re: ${msg.enquirySubject}</div>
          <div class="message-text">${msg.text}</div>
          <div class="message-time">${AuthSystem.formatDate(msg.timestamp)}</div>
        </div>
      `).join('');
    }

    function closeEnquiryModal() {
      document.getElementById('enquiryModal').style.display = 'none';
    }

    function logout() {
      if (confirm('Logout?')) {
        AuthSystem.logout();
      }
    }
  </script>
</body>
</html>
