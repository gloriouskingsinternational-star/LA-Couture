<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — L.A. Couture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #09080b 0%, #1a1512 100%);
      padding: 20px;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 48px;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 48px;
    }

    .auth-logo img {
      width: 80px;
      height: auto;
      margin-bottom: 16px;
    }

    .auth-logo h1 {
      color: var(--ivory);
      font-size: 1.4rem;
      margin: 0;
    }

    .auth-logo p {
      color: var(--muted);
      font-size: 0.85rem;
      margin: 8px 0 0 0;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      color: var(--text);
      font-size: 0.85rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--ivory);
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.08);
    }

    .form-group input::placeholder {
      color: rgba(248, 244, 239, 0.4);
    }

    .auth-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold) 0%, #a8751a 100%);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(197, 155, 45, 0.3);
    }

    .auth-error {
      background: rgba(255, 69, 69, 0.1);
      border: 1px solid rgba(255, 69, 69, 0.3);
      color: #ff6b6b;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      display: none;
      font-size: 0.9rem;
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s ease;
    }

    .back-link a:hover {
      color: #d4af37;
    }
  </style>
</head>
<body style="background: linear-gradient(135deg, #09080b 0%, #1a1512 100%);">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="img/logo2.jpg" alt="L.A. Couture">
        <h1>Admin Portal</h1>
        <p>L.A. Couture Management</p>
      </div>

      <form id="adminLoginForm">
        <div class="auth-error" id="errorMsg"></div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="admin@lacouture.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="auth-btn">Sign In</button>
      </form>

      <div class="back-link">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const form = document.getElementById('adminLoginForm');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = form.querySelector('.auth-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errorMsg.style.display = 'none';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Rate limit client-side
      const rl = FormSecurity.checkRateLimit('admin-login', 5, 5 * 60 * 1000);
      if (!rl.allowed) {
        errorMsg.textContent = `Too many attempts. Try again in ${rl.waitSecs}s.`;
        errorMsg.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In';
        return;
      }

      try {
        const res = await LAApi.auth.adminLogin(email, password);
        if (res.ok) {
          window.location.href = 'admin-dashboard.html';
        } else {
          errorMsg.textContent = res.data?.message || 'Invalid credentials.';
          errorMsg.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Sign In';
        }
      } catch (err) {
        errorMsg.textContent = 'Cannot reach server. Check your connection.';
        errorMsg.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
