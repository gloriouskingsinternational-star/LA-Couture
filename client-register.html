<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Registration — L.A. Couture</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #09080b 0%, #1a1512 100%);
      padding: 20px;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 48px;
      max-width: 500px;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-logo img {
      width: 80px;
      height: auto;
      margin-bottom: 16px;
    }

    .auth-logo h1 {
      color: var(--ivory);
      font-size: 1.4rem;
      margin: 0 0 8px 0;
    }

    .auth-logo p {
      color: var(--muted);
      font-size: 0.85rem;
      margin: 0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: var(--text);
      font-size: 0.85rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--ivory);
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.08);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(248, 244, 239, 0.4);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .auth-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold) 0%, #a8751a 100%);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(197, 155, 45, 0.3);
    }

    .auth-error {
      background: rgba(255, 69, 69, 0.1);
      border: 1px solid rgba(255, 69, 69, 0.3);
      color: #ff6b6b;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      display: none;
      font-size: 0.9rem;
    }

    .auth-link {
      text-align: center;
      margin-top: 24px;
    }

    .auth-link a,
    .auth-link button {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.9rem;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .auth-link a:hover,
    .auth-link button:hover {
      color: #d4af37;
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s ease;
    }

    .back-link a:hover {
      color: #d4af37;
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .auth-card {
        padding: 32px;
      }
    }
  </style>
</head>
<body style="background: linear-gradient(135deg, #09080b 0%, #1a1512 100%);">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="img/Logo%202.jpg" alt="L.A. Couture">
        <h1>Create Account</h1>
        <p>Join L.A. Couture</p>
      </div>

      <form id="registerForm">
        <div class="auth-error" id="errorMsg"></div>

        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name *</label>
            <input type="text" id="firstName" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name *</label>
            <input type="text" id="lastName" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password *</label>
            <input type="password" id="confirmPassword" required>
          </div>
        </div>

        <div class="form-group">
          <label for="interests">Interests / Collection Preference</label>
          <textarea id="interests" placeholder="e.g., Bridal, Evening Wear, Bespoke..." style="resize: vertical;"></textarea>
        </div>

        <button type="submit" class="auth-btn">Create Account</button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="client-login.html">Sign In</a>
      </div>

      <div class="back-link">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const interests = document.getElementById('interests').value;
      const errorMsg = document.getElementById('errorMsg');

      // Validation
      if (!firstName || !lastName || !email || !password) {
        errorMsg.textContent = 'Please fill in all required fields';
        errorMsg.style.display = 'block';
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match';
        errorMsg.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters';
        errorMsg.style.display = 'block';
        return;
      }

      const result = AuthSystem.clientRegister({
        name: firstName + ' ' + lastName,
        firstName,
        lastName,
        email,
        phone,
        password,
        interests
      });

      if (result.success) {
        alert('Registration successful! Your account is pending admin approval. You will be notified via email when approved.');
        window.location.href = 'index.html';
      } else {
        errorMsg.textContent = result.error;
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
